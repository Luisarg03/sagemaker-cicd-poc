name: SageMaker CICD

on:
  push:
    branches: ['model-*', 'main', 'qa', 'prod']
  pull_request:
    branches: ['model-*', 'qa', 'prod']

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  MINISTACK_ENDPOINT: http://localhost:4566

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Linting Tools
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check .

  build-push:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract model name from branch
        run: echo "MODEL_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      - name: Build preprocessing image
        run: docker build -t $MODEL_NAME:preprocessing $MODEL_NAME/training/artifacts/preprocessing/
      - name: Build training image
        run: docker build -t $MODEL_NAME:training $MODEL_NAME/training/artifacts/training/
      - name: Build validation image
        run: docker build -t $MODEL_NAME:validation $MODEL_NAME/training/artifacts/validation/

  upload-s3:
    needs: build-push
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - name: Extract model name from branch
        run: echo "MODEL_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install boto3
      - name: Wait for ministack
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4566 > /dev/null 2>&1; then break; fi
            echo "Waiting for ministack... ($i)"
            sleep 3
          done
      - name: Create S3 bucket
        run: aws s3 mb s3://company-sagemaker-poc-bucket --endpoint-url $MINISTACK_ENDPOINT
      - name: Upload code to S3
        run: python scripts/deploy_s3.py --config $MODEL_NAME/config.json --root $MODEL_NAME --endpoint-url $MINISTACK_ENDPOINT

  deploy-pipeline:
    needs: upload-s3
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - name: Extract model name from branch
        run: echo "MODEL_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install setuptools pytz "sagemaker==2.232.0" boto3
      - name: Wait for ministack
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4566 > /dev/null 2>&1; then break; fi
            echo "Waiting for ministack... ($i)"
            sleep 3
          done
      - name: Create S3 bucket
        run: aws s3 mb s3://company-sagemaker-poc-bucket --endpoint-url $MINISTACK_ENDPOINT || true
      - name: Inject image URIs into config
        run: |
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then ENV=dev
          elif [[ "$GITHUB_REF_NAME" == "qa" ]]; then ENV=qa
          elif [[ "$GITHUB_REF_NAME" == "prod" ]]; then ENV=prod
          else ENV=dev
          fi
          python scripts/update_config.py --env $ENV --sha ${{ github.sha }} --config $MODEL_NAME/config.json
      - name: Upsert SageMaker Pipeline
        run: |
          python $MODEL_NAME/training/pipeline.py \
            --local \
            --config $MODEL_NAME/config.json \
            --s3-endpoint-url $MINISTACK_ENDPOINT \
            --upsert-only

  ghas-dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  publish-to-registry:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    outputs:
      registry_url: localhost:5001
      image_tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract model name from branch
        run: echo "MODEL_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      - name: Tag and push images to registry
        run: |
          for step in preprocessing training validation; do
            docker tag $MODEL_NAME:$step localhost:5001/$MODEL_NAME/$step:sha-${{ github.sha }}
            docker push localhost:5001/$MODEL_NAME/$step:sha-${{ github.sha }}
          done

  promote-to-qa:
    if: github.event_name == 'push' && github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    steps:
      - uses: actions/checkout@v4
      - name: Extract model name
        run: echo "MODEL_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
      - name: Promote images to QA
        continue-on-error: true  # PoC limitation: local registry is ephemeral per job. With Artifactory, docker pull would succeed.
        run: |
          # TODO: replace with jf rt docker-promote when Artifactory is available
          for step in preprocessing training validation; do
            docker pull localhost:5001/$MODEL_NAME/$step:sha-${{ github.sha }}
            docker tag localhost:5001/$MODEL_NAME/$step:sha-${{ github.sha }} localhost:5001/$MODEL_NAME/$step:qa-${{ github.sha }}
            docker push localhost:5001/$MODEL_NAME/$step:qa-${{ github.sha }}
          done

  promote-to-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    steps:
      - uses: actions/checkout@v4
      - name: Extract model name
        run: echo "MODEL_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
      - name: Promote images to Prod
        continue-on-error: true  # PoC limitation: local registry is ephemeral per job. With Artifactory, docker pull would succeed.
        run: |
          # TODO: replace with jf rt docker-promote when Artifactory is available
          for step in preprocessing training validation; do
            docker pull localhost:5001/$MODEL_NAME/$step:sha-${{ github.sha }}
            docker tag localhost:5001/$MODEL_NAME/$step:sha-${{ github.sha }} localhost:5001/$MODEL_NAME/$step:prod-${{ github.sha }}
            docker push localhost:5001/$MODEL_NAME/$step:prod-${{ github.sha }}
          done

