name: SageMaker CICD PoC

on:
  push:
    branches: [ model-poc ]
    paths:
      - 'model-poc/**'
      - 'scripts/**'
      - '.github/workflows/cicd.yml'
  pull_request:
    branches: [ model-poc ]
    paths:
      - 'model-poc/**'
      - 'scripts/**'
      - '.github/workflows/cicd.yml'

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  MINISTACK_ENDPOINT: http://localhost:4566

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Linting Tools
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check .

  build-push:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build preprocessing image
        run: docker build -t sagemaker-model-poc:preprocessing model-poc/training/artifacts/preprocessing/
      - name: Build training image
        run: docker build -t sagemaker-model-poc:training model-poc/training/artifacts/training/
      - name: Build validation image
        run: docker build -t sagemaker-model-poc:validation model-poc/training/artifacts/validation/

  upload-s3:
    needs: build-push
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install boto3
      - name: Wait for ministack
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4566 > /dev/null 2>&1; then break; fi
            echo "Waiting for ministack... ($i)"
            sleep 3
          done
      - name: Create S3 bucket
        run: aws s3 mb s3://company-sagemaker-poc-bucket --endpoint-url $MINISTACK_ENDPOINT
      - name: Upload code to S3
        run: python scripts/deploy_s3.py --config model-poc/config.json --root model-poc --endpoint-url $MINISTACK_ENDPOINT

  deploy-pipeline:
    needs: upload-s3
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install setuptools pytz "sagemaker==2.232.0" boto3
      - name: Wait for ministack
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4566 > /dev/null 2>&1; then break; fi
            echo "Waiting for ministack... ($i)"
            sleep 3
          done
      - name: Create S3 bucket
        run: aws s3 mb s3://company-sagemaker-poc-bucket --endpoint-url $MINISTACK_ENDPOINT || true
      - name: Upsert SageMaker Pipeline
        run: |
          python model-poc/training/pipeline.py \
            --local \
            --config model-poc/config.json \
            --s3-endpoint-url $MINISTACK_ENDPOINT \
            --upsert-only
