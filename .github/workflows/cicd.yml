name: SageMaker CICD PoC

on:
  push:
    branches: [ model-poc ]
  pull_request:
    branches: [ model-poc ]

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  MINISTACK_ENDPOINT: http://localhost:4566

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Linting Tools
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check .

  build-push:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build processing image
        run: docker build -t sagemaker-processing-poc:latest -f docker/processing/Dockerfile .
      - name: Build training image
        run: docker build -t sagemaker-training-poc:latest -f docker/training/Dockerfile .

  upload-s3:
    needs: build-push
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install boto3
      - name: Create S3 bucket
        run: aws s3 mb s3://company-sagemaker-poc-bucket --endpoint-url $MINISTACK_ENDPOINT
      - name: Upload code to S3
        run: python scripts/deploy_s3.py --config model-poc/config.json --root model-poc --endpoint-url $MINISTACK_ENDPOINT

  deploy-pipeline:
    needs: upload-s3
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install "sagemaker==2.232.0" boto3 pandas joblib
      - name: Upsert SageMaker Pipeline
        run: |
          python model-poc/training/pipeline.py \
            --local \
            --config model-poc/config.json \
            --s3-endpoint-url $MINISTACK_ENDPOINT \
            --upsert-only
