name: SageMaker CICD PoC — model-poc-2

on:
  push:
    branches: [ model-poc ]
    paths:
      - 'model-poc-2/**'
      - 'scripts/**'
      - '.github/workflows/cicd-model-poc-2.yml'
  pull_request:
    branches: [ model-poc ]
    paths:
      - 'model-poc-2/**'
      - 'scripts/**'
      - '.github/workflows/cicd-model-poc-2.yml'

env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  MINISTACK_ENDPOINT: http://localhost:4566

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Linting Tools
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check .

  build-push:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build preprocessing image
        run: docker build -t sagemaker-model-poc-2:preprocessing -f model-poc-2/training/artifacts/preprocessing/Dockerfile .
      - name: Build training image
        run: docker build -t sagemaker-model-poc-2:training -f model-poc-2/training/artifacts/training/Dockerfile .
      - name: Build validation image
        run: docker build -t sagemaker-model-poc-2:validation -f model-poc-2/training/artifacts/validation/Dockerfile .

  upload-s3:
    needs: build-push
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install boto3
      - name: Wait for ministack
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4566 > /dev/null 2>&1; then break; fi
            echo "Waiting for ministack... ($i)"
            sleep 3
          done
      - name: Create S3 bucket
        run: aws s3 mb s3://interbank-sagemaker-poc-bucket-2 --endpoint-url $MINISTACK_ENDPOINT
      - name: Upload code to S3
        run: python scripts/deploy_s3.py --config model-poc-2/config.json --root model-poc-2 --endpoint-url $MINISTACK_ENDPOINT

  deploy-pipeline:
    needs: upload-s3
    runs-on: ubuntu-latest
    services:
      ministack:
        image: ministackorg/ministack:latest
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: pip install setuptools pytz "sagemaker==2.232.0" boto3
      - name: Wait for ministack
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4566 > /dev/null 2>&1; then break; fi
            echo "Waiting for ministack... ($i)"
            sleep 3
          done
      - name: Create S3 bucket
        run: aws s3 mb s3://interbank-sagemaker-poc-bucket-2 --endpoint-url $MINISTACK_ENDPOINT || true
      - name: Upsert and Run SageMaker Pipeline
        run: |
          python model-poc-2/training/pipeline.py \
            --local \
            --config model-poc-2/config.json \
            --s3-endpoint-url $MINISTACK_ENDPOINT
